# cfgs/default.yaml

# ======================
# Data configuration
# ======================
data:
  trainloader:
    name: date
    params:
      file: fake_data.parquet
      fillna: zero
      dffilter: null
      normalize: null

  validloader:
    name: date
    params:
      file: fake_data.parquet
      fillna: zero
      dffilter: null
      normalize: null

  evalloader:
    name: date
    params:
      file: fake_data.parquet
      fillna: zero
      dffilter: null
      normalize: null

  label:
    - y
  features: fake.pkl
  eqtydata: EqtyData.pkl


# ======================
# Model configuration
# ======================
model:
  name: mlp
  params:
    # feature_dim: 450
    hidden_dims: [32]
    dropout: 0.1
    init: xavier   # Reserved: xavier / normal / kaiming


# ======================
# Loss configuration
# ======================
loss:
  name: mse
  params: {}


# ======================
# Metric configuration
# ======================
metric:
  pearsonic: {}
  spearmanic: {}
  topk:
    k: 50


# ======================
# Training configuration
# ======================
train:
  epochs: 10
  lr: 0.001
  optimizer:
    name: Adam
    params:
      weight_decay: 0.0001
  scheduler:
    name: StepLR
    params:
      step_size: 5
      gamma: 0.5
  device: cpu
  record: False
  logdir: tensorboard
  early_stop:
    patience: 5
    monitor:
      - pearsonic
      - topk
  checkpoint:
    save_best: True
    save_latest: True
    save_every_step: True


# ======================
# Evaluating configuration
# ======================
eval:
  device: cpu
  record: False
  logdir: tensorboard


# end of cfgs/default.yaml